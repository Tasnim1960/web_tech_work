<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model and Display Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Box Model Demonstration</h1>

    <!-- Part A: Box Model -->
    <div class="box box1">Box 1 (Default box-sizing)</div>
    <div class="box box2">Box 2 (Different spacing)</div>
    <div class="box box3">Box 3 (border-box)</div>

    <h2>Display Properties</h2>

    <!-- Part C -->
    <div class="block-example">Block Element (div)</div>

    <span class="inline-example">Inline Span 1</span>
    <span class="inline-example">Inline Span 2</span>

    <p class="inline-block-example">Inline-Block Paragraph</p>

    <p class="hidden-display">This uses display: none</p>

    <h2>Visibility vs Display</h2>

    <p class="visibility-hidden">This uses visibility: hidden</p>
    <p class="display-none">This uses display: none</p>

</body>
</html>
