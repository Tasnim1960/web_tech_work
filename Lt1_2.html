<!DOCTYPE html>
<html>
<head>
    <title>Lab Task 01 - JavaScript Basics</title>
</head>
<body>

    <h1>JavaScript Basics and User Interaction</h1>

    <div id="output"></div>

    <script>
        // =========================
        // Part A: Basic Output
        // =========================

        alert("Welcome to JavaScript Lab Task 01!");

        console.log("This message is shown in the browser console.");

        document.write("<h3>Welcome! This message is written using document.write()</h3>");


        // =========================
        // Part B: Variables and Operations
        // =========================

        var studentName = "Kaiser";
        var studentAge = 22;

        var nextYearAge = studentAge + 1; // Arithmetic
        var message = "Student Name: " + studentName + 
                      "<br>Current Age: " + studentAge +
                      "<br>Next Year Age: " + nextYearAge; // String concatenation

        document.getElementById("output").innerHTML = message;


        // =========================
        // Part C: User Input and Type Casting
        // =========================

        var num1 = prompt("Enter first number:");
        var num2 = prompt("Enter second number:");

        num1 = Number(num1);
        num2 = Number(num2);

        var sum = num1 + num2;
        var difference = num1 - num2;
        var product = num1 * num2;

        document.write("<h3>Arithmetic Results:</h3>");
        document.write("Sum: " + sum + "<br>");
        document.write("Difference: " + difference + "<br>");
        document.write("Product: " + product + "<br>");


        // =========================
        // Part D: Conditional Statement
        // =========================

        var checkNumber = prompt("Enter a number to check even or odd:");
        checkNumber = parseInt(checkNumber);

        if (checkNumber % 2 === 0) {
            document.write("<h3>The number " + checkNumber + " is Even.</h3>");
        } else {
            document.write("<h3>The number " + checkNumber + " is Odd.</h3>");
        }

    </script>

</body>
</html>
